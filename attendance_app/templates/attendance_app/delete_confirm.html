{% extends 'attendance_app/base.html' %}
{% block content %}
<div class="card shadow p-5 mx-auto text-center" style="max-width: 500px;">
    <h3 class="text-danger">Confirm Delete</h3>
    <p>Are you sure you want to delete <strong>{{ item }}</strong>?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger w-100 mb-2">Yes, Delete</button>
        <a href="{% url back_url %}" class="btn btn-light w-100 border">Cancel</a>
    </form>
</div>
{% endblock %}
``
